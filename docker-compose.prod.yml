services:
  web:
    image: ghcr.io/the-broke-sommeliers/wine-cellar-web:latest
    command: gunicorn wine_cellar.conf.wsgi:application --bind 0.0.0.0:8000 --worker-class gthread --threads 4 --workers 2
    volumes:
      - static_volume:/home/app/web/staticfiles
      - media_volume:/home/app/web/mediafiles
    expose:
      - 8000
    env_file:
      - ./.env.prod
    environment:
      - CONTAINER_ROLE=web
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  db:
    image: postgres:16@sha256:a4f57f2c250b724a6fb1d41892b177f886ec282be6286c5bfc2afc9f546bb59d
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod.db
  caddy:
    image: caddy:2@sha256:af5fdcd76f2db5e4e974ee92f96ee8c0fc3edb55bd4ba5032547cbf3f65e486d
    restart: unless-stopped
    ports:
      - 127.0.0.1:8085:80
    volumes:
      - ./caddy:/etc/caddy/
      - static_volume:/srv/static
      - media_volume:/srv/media
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
  celery:
    image: ghcr.io/the-broke-sommeliers/wine-cellar-web:latest
    command: celery -A wine_cellar.conf worker -l info
    env_file:
      - ./.env.prod
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_started
  celery-beat:
    image: ghcr.io/the-broke-sommeliers/wine-cellar-web:latest
    command: celery -A wine_cellar.conf beat -l info
    env_file:
      - ./.env.prod
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  postgres_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:
