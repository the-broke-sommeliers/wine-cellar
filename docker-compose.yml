name: wine-cellar-dev

services:
  web:
    build: .
    command: >
      sh -c "npm run watch & exec python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/usr/src/app
    ports:
      - 127.0.0.1:8000:8000
    env_file:
      - ./.env.dev
    environment:
      - CONTAINER_ROLE=web
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  db:
    image: postgres:16@sha256:a4f57f2c250b724a6fb1d41892b177f886ec282be6286c5bfc2afc9f546bb59d
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=django_dev_user
      - POSTGRES_PASSWORD=django_dev_password
      - POSTGRES_DB=django_dev
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
  celery:
    build: .
    command: celery -A wine_cellar.conf worker -l info
    env_file:
      - ./.env.dev
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_started
  celery-beat:
    build: .
    command: celery -A wine_cellar.conf beat -l info
    env_file:
      - ./.env.dev
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
